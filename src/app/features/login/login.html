<div class="lg:grid lg:grid-cols-5 h-full">
  <div class="lg:col-span-3 bg-primary hidden lg:block"></div>
  <div
    [formGroup]="loginForm"
    class="lg:col-span-2 h-full justify-center items-center p-12 flex flex-col gap-4"
  >
    <nova-input label="email" formControlName="email" placeholder="Digite seu e-mail">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-mail-icon lucide-mail"
      >
        <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7" />
        <rect x="2" y="4" width="20" height="16" rx="2" />
      </svg>
    </nova-input>
    <nova-input-password
      label="senha"
      formControlName="password"
      placeholder="digite sua senha"
    ></nova-input-password>
    <nova-button>acessar</nova-button>
    <hr class="h-px w-full text-border px-4" />
  </div>
</div>
